{% extends "base.html" %}
{% block title %}Login — Mailcow Toolkit{% endblock %}

{% block content %}
<div class="login-container">
  <h1 data-i18n="login_title">Mailcow Toolkit</h1>
  <p class="subtitle" data-i18n="login_subtitle">Verifying Mailcow API connection...</p>

  {% if error %}
  <div class="login-error" data-i18n="api_key_invalid">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
    <p class="login-desc" data-i18n="login_desc">
      Click below to verify your Mailcow API connection and enter the toolkit.
    </p>
    <button type="submit" class="btn btn-primary login-btn" data-i18n="connect">Connect</button>
  </form>
</div>
{% endblock %}
